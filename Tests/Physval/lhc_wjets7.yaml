EVENTS: 1k
BATCH_MODE: 7
EVENT_GENERATION_MODE: W

BEAMS: 2212
BEAM_ENERGIES: 3500

# me generator settings
ME_GENERATORS:
  - Comix
  - Amegic
  - OpenLoops

# EW corrections setup
OL_PARAMETERS:
  ew_renorm_scheme: 1
  write_paraemeters: 1

EW_SCHEME: 3
GF: 1.166397e-5
METS_BBAR_MODE: 5

# speed and neg weight fraction improvements

MC@NLO:
  PSMODE: 1

PROCESSES:
  - 93 93 -> 13 -14 93{4}:
      Order: {QCD: 0, EW: 2}
      CKKW: 20
      2->2-4:
        Enhance_Observable: VAR{log10(max(sqrt(H_T2)-PPerp(p[2])-PPerp(p[3]),MPerp(p[2]+p[3])))}|1|3.3 {3,4,5,6,7}
        NLO_Mode: MC@NLO
        NLO_Order: {QCD: 1, EW: 0}
        ME_Generator: Amegic
        RS_ME_Generator: Comix
        Loop_Generator: OpenLoops
      2->6:
        Max_N_Quarks: 4
        Max_Epsilon: 0.01
      2->2-6:
        Integration_Error 0.99

  - 93 93 -> -13 14 93{4}:
      Order: {QCD: 0, EW: 2}
      CKKW: 20
      2->2-4:
        Enhance_Observable: VAR{log10(max(sqrt(H_T2)-PPerp(p[2])-PPerp(p[3]),MPerp(p[2]+p[3])))}|1|3.3 {3,4,5,6,7}
        NLO_Mode: MC@NLO
        NLO_Order: {QCD: 1, EW: 0}
        ME_Generator: Amegic
        RS_ME_Generator: Comix
        Loop_Generator: OpenLoops
      2->6:
        Max_N_Quarks: 4
        Max_Epsilon: 0.01
      2->2-6:
        Integration_Error 0.99

SELECTORS:
  - [Mass, 13, -14, 2.0, E_CMS]
  - [Mass, -13, 14, 2.0, E_CMS]

ANALYSIS: Rivet
RIVET:
  --analyses:
    - ATLAS_2014_I1319490:LMODE=MU
    - ATLAS_2014_I1282447
    - ATLAS_2013_I1219109:LMODE=MU
    - ATLAS_2013_I1217867    
    - ATLAS_2011_I925932
    - CMS_2014_I1303894
    - MC_WJETS:LMODE=MU
    - MC_WINC:LMODE=MU
