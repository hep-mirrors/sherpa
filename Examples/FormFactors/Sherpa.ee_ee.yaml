EVENT_GENERATION_MODE: 'Unweighted' 
ANALYSIS: Rivet

OUTPUT: 4
EVENTS: 10k

BEAMS:  [11, -11]  # proton beam + electron beam (neutron avaiable too, just adjust beam energy)
BEAM_ENERGIES: [1., 1.]  # proton at rest, 1 GeV electron
BEAM_MODE: Fixed_Target
BEAM_SPECTRA: [Monochromatic, Fixed_Target]  # proton=fixed target, electron=beam

PARTICLE_DATA:
  11:  # electron
    Massive: 1

PROCESSES:
- 11 -11 -> -11 11:  # p[0] e-[1] -> p[2] e-[3] 
    Order: {QCD: 0, EW: 2} 

FRAGMENTATION: None
SHOWER_GENERATOR: None
ISR_HANDLER: None  # Disable ISR for elastic scattering (should be handled by pdfs)

PDF_SET: [None, None]  # proton: special, electron: None

ME_GENERATORS: Amegic

EW_SCHEME: 1
MODEL: SM  # Standard Model

SCALES: VAR{-Abs2(p[3]-p[1])}  # Q2 = momentum transfer squared

# Phase space integration settings
INTEGRATION:
  FINISH_OPTIMIZATION: Off  # Disable adaptive optimization that might bias phi

SELECTORS:
- [Q2, 11, 11, 0.0001, 3] #[observable, flavor1, flavor2, min, max]  

NANOBARN: 0
YFS:
  MODE: 0
ME_QED: 
  - ENABLED: False

