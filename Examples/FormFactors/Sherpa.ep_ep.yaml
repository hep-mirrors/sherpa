EVENT_GENERATION_MODE: 'Unweighted' 
ANALYSIS: Rivet

OUTPUT: 4
EVENTS: 10k

BEAMS:  [11, 2212]  # proton beam + electron beam (neutron avaiable too, just adjust beam energy)
BEAM_ENERGIES: [1., 0]  # proton at rest, 1 GeV electron
BEAM_MODE: Fixed_Target
BEAM_SPECTRA: [Monochromatic, Fixed_Target]  # proton=fixed target, electron=beam

PARTICLE_DATA:
  2212:  # proton
    Massive: 1
  11:  # electron
    Massive: 1

PROCESSES:
- 11 2212 -> 11 2212:  # e-[0] p[1] -> e-[2] p[3] 
    Order: {QCD: 0, EW: 2} 

# Form factor parameters (boson and nucleon type auto-detected from process)
Form_Factor:
  Model: Off # Kelly or Dipole available
  Include_Z_Interference: false

FRAGMENTATION: None
SHOWER_GENERATOR: None
ISR_HANDLER: None  # Disable ISR for elastic scattering (should be handled by pdfs)

PDF_SET: [None, QuasiElastic]  # proton: special, electron: None

ME_GENERATORS: Internal 

EW_SCHEME: 1
MODEL: SM  # Standard Model

SCALES: VAR{-Abs2(p[2]-p[0])}  # Q2 = momentum transfer squared

# Phase space integration settings
INTEGRATION:
  FINISH_OPTIMIZATION: Off  # Disable adaptive optimization that might bias phi

SELECTORS:
- [Q2, 11, 11, 0.0001, 3] #[observable, flavor1, flavor2, min, max]  

NANOBARN: 0
YFS:
  MODE: 0
ME_QED: 
  - ENABLED: False

ANALYSIS: Rivet
ANALYSIS_OUTPUT: Analysis_ep_ep

# Rivet analyses - need to specify the plugin path for custom analyses
RIVET:
  --analyses: [MC_XS, MC_FSPARTICLES]
  #--pwd: /Users/.../MyRivetAnalyses


