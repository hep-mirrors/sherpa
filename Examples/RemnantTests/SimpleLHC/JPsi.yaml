# Sherpa configuration for Z[ee]+Jets production

# set up beams for LHC run 1
BEAMS:            2212
BEAM_ENERGIES:    6500
# MI_HANDLER:       None
SHOWER_GENERATOR: CSS
# FRAGMENTATION:    None
# ME_GENERATORS:       None
# SOFT_COLLISIONS:     Amisic
# RECONNECTION: None

# matrix-element calculation
ME_GENERATORS:
  - Internal
  - Comix

QUARKONIA:
    # 443:        0.81*5000/0.22/0.22*9/2/3.14/0.22
    1S0_441:    0.
    3S1_441:    0.
    1S0_443:    53.49E-03
    1S0_100443: 48.806E-03
    3S1_100443: 4.943E-03
    3S1_443:    6.414E-03
    3S1_10441:  13.591E-03
    3S1_20443:  3.*13.591E-03
    3S1_445:    3.*13.591E-03
    # 3P0_443:    5E-03
    # 3P1_443:    5E-03
    # 3P2_443:    5E-03
    Enhance:  100.0
    # v8_2: 0.0 

# SHOWER:
    # ENABLE_QUARKONIA: 0
    # MAXEM: 0

AMISIC:
  EVENT_TYPE:     Perturbative
  PT_0:           0.5
  PT_Min:         1.0
  SIGMA_ND_NORM:  1.0
  MU_R_FACTOR:    1.0
  MU_F_FACTOR:    1.0
  TRIGGER:        [443, 9900443]
  #N_MaxScatters:  100

ALPHAS(MZ): 0.1188
ORDER_ALPHAS: 1
ALPHAS: {USE_PDF: 0}
SCALES: METS{H_T2/4} 

HADRON_DECAYS:
    Channels:
        443:
            13, -13:
                BR: [0.98823, 0.00034]
                Origin: PDG2023

# AMISIC:
    # PT_Min(ref): 5
    # Eta: 1.5


# pp -> Z[ee]+jets
PROCESSES:
- 93 93 -> 93 93:
    Order: {QCD: 2, EW: 0}
    Enhance_Function: VAR{PPerp2(p[3])/500}
